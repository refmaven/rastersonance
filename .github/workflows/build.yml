name: Build and upload dist

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build library (ESM)
        run: npx esbuild src/index.js --bundle --format=esm --minify --outfile=dist/rastersonance.esm.js

      - name: Build library (UMD global)
        run: npx esbuild src/index.js --bundle --format=iife --global-name=Rastersonance --minify --outfile=dist/rastersonance.umd.js

      - name: Copy TypeScript definitions to dist
        if: always()
        run: |
          mkdir -p dist
          cp index.d.ts dist/index.d.ts || true

      - name: Show dist contents
        run: ls -la dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

      - name: Commit and push dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add dist/
          git commit -m "update dist [ci skip]" || echo "no changes to commit"

          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:main
