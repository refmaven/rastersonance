name: Build and upload dist

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build library (ESM)
        run: npx esbuild src/index.js --bundle --format=esm --minify --outfile=dist/rastersonance.esm.js

      - name: Build library (UMD global)
        run: npx esbuild src/index.js --bundle --format=iife --global-name=Rastersonance --minify --outfile=dist/rastersonance.umd.js

      - name: Show dist contents
        run: ls -la dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
